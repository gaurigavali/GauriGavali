<html>
<head>
    <title>PR.15.EX</title>
</head>

<body>
    <h1>PRACTICAL NO.15</h1>
    <h2 align="center">Image Formatting in HTML</h2>


    <img src="x.jfif" width="300" height="200" border="3" alt="Sample Image">

    <br><br>


    <img src="y.jfif" width="250" height="150" align="left" alt="Left Image">
    <p>
        This text flows beside the image.
        The image is aligned to the left using the align attribute.
    </p>
    <br />
    <img src="xyz.jfif" width="200" height="150"
         hspace="20" vspace="20" border="2" alt="Spaced Image">

</body>
</html>
