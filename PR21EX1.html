<!DOCTYPE html>
<html>
<head>
    <body style="background-color:red">

        <title>HTML Form </title>
        <style>
            body {
                background: linear-gradient(to right, pink, lightblue);
                font-family: Arial;
            }

            .formbox {
                background: white;
                width: 350px;
                margin: auto;
                padding: 20px;
                border-radius: 10px;
                box-shadow: 0px 0px 10px gray;
            }

            h2 {
                text-align: center;
                color: purple;
            }

            label {
                font-weight: bold;
            }

            input[type=text] {
                width: 100%;
                padding: 8px;
                margin: 5px 0 10px 0;
                border-radius: 5px;
                border: 1px solid gray;
            }

            button {
                background: green;
                color: white;
                padding: 10px;
                border: none;
                border-radius: 5px;
                width: 100%;
                font-size: 16px;
            }

                button:hover {
                    background: darkgreen;
                }
        </style>
</head>
<body>
    <div class="formbox">
        <h2>HTML Forms</h2>
        <form>
            <label>First name:</label><br>
