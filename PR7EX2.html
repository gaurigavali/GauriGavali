<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mathematical Symbols</title>
</head>
<body>
    <h2>Mathematical Symbols in HTML</h2>
    <p>
        Addition: &plus; <br>
        Subtraction: &minus; <br>
        Multiplication: &times; <br>
        Division: &divide; <br>
        Pi: &pi;
    </p>
</body>
</html>
